name: CI/CD Docker to GCP Compute (Python)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  pythonVersion: "3.11"
  instanceName: "instance-20260223-200714"
  instanceZone: "us-central1-c"
  projectId: "serious-cat-488312-p9"
  imageName: "creonnect-python"

jobs:
  ci:
    name: Test Checks
    runs-on: ubuntu-latest
    env:
      PYTHONWARNINGS: ignore::DeprecationWarning
      ENV: test
      DATABASE_URL: sqlite+aiosqlite:///./test.db
      REDIS_URL: redis://localhost:6379/0
      OPENAI_API_KEY: sk-test-placeholder
      GEMINI_API_KEY: test-placeholder
      BRAND_API_KEY: test-placeholder
      CREONNECT_SESSION_SECRET: test-placeholder-secret-for-ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.pythonVersion }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          if [ -f backend/requirements.txt ]; then
            pip install -r backend/requirements.txt
          fi

      - name: Run antigravity suites
        run: |
          python -m pytest backend/app/tests/test_api_antigravity_runner.py -v --tb=short
          python -m pytest backend/app/tests/test_system_antigravity_suite.py -v --tb=short

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: ci
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image variables
        id: vars
        run: |
          echo "image_tag=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.imageName }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ env.imageName }}:${{ steps.vars.outputs.image_tag }}

  deploy:
    name: Deploy Docker on GCP VM via IAP
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - name: Setup gcloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.projectId }}

      - name: Configure project
        run: gcloud config set project "${{ env.projectId }}"

      - name: Sync .env from GitHub secret
        env:
          GCP_APP_ENV: ${{ secrets.GCP_APP_ENV }}
        run: |
          APP_DIR="${{ secrets.GCP_APP_DIR || '/opt/creonnect-python' }}"

          if [ -z "${GCP_APP_ENV:-}" ]; then
            echo "Missing required secret: GCP_APP_ENV"
            exit 1
          fi

          printf '%s' "$GCP_APP_ENV" > app.env

          gcloud compute ssh "${{ env.instanceName }}" \
            --zone "${{ env.instanceZone }}" \
            --project "${{ env.projectId }}" \
            --tunnel-through-iap \
            --command "sudo mkdir -p ${APP_DIR}"

          gcloud compute scp \
            --zone "${{ env.instanceZone }}" \
            --project "${{ env.projectId }}" \
            --tunnel-through-iap \
            app.env "${{ env.instanceName }}:/tmp/creonnect-python.env"

          gcloud compute ssh "${{ env.instanceName }}" \
            --zone "${{ env.instanceZone }}" \
            --project "${{ env.projectId }}" \
            --tunnel-through-iap \
            --command "sudo mv /tmp/creonnect-python.env ${APP_DIR}/.env && sudo chmod 600 ${APP_DIR}/.env"

          rm -f app.env

      - name: Pull and restart containers on VM
        run: |
          APP_DIR="${{ secrets.GCP_APP_DIR || '/opt/creonnect-python' }}"
          IMAGE_REPO="${{ secrets.DOCKER_USERNAME }}/${{ env.imageName }}"
          IMAGE_TAG="${{ needs.build-and-push.outputs.image_tag }}"

          gcloud compute ssh "${{ env.instanceName }}" \
            --zone "${{ env.instanceZone }}" \
            --project "${{ env.projectId }}" \
            --tunnel-through-iap \
            --command "bash -lc 'set -euo pipefail; \
              [ -f ${APP_DIR}/.env ] || { echo \"Missing ${APP_DIR}/.env\"; exit 1; }; \
              command -v docker >/dev/null 2>&1 || { echo \"Docker is not installed on VM\"; exit 1; }; \
              sudo docker network create creonnect-net >/dev/null 2>&1 || true; \
              for svc in creonnect-redis; do \
                sudo docker inspect \"\${svc}\" >/dev/null 2>&1 || true; \
                sudo docker network connect creonnect-net \"\${svc}\" >/dev/null 2>&1 || true; \
              done; \
              echo \"${{ secrets.DOCKER_PASSWORD }}\" | sudo docker login -u \"${{ secrets.DOCKER_USERNAME }}\" --password-stdin; \
              sudo docker pull ${IMAGE_REPO}:${IMAGE_TAG}; \
              sudo docker rm -f creonnect-python-api creonnect-python-worker >/dev/null 2>&1 || true; \
              sudo docker run -d --name creonnect-python-api --restart unless-stopped --network creonnect-net --env-file ${APP_DIR}/.env -p 8000:8000 ${IMAGE_REPO}:${IMAGE_TAG}; \
              sudo docker run -d --name creonnect-python-worker --restart unless-stopped --network creonnect-net --env-file ${APP_DIR}/.env -e QUEUE_BACKEND=sqs ${IMAGE_REPO}:${IMAGE_TAG} python -m backend.app.workers.sqs_worker; \
              sudo docker image prune -f >/dev/null 2>&1 || true; \
              sudo docker ps --filter name=creonnect-python-api --filter name=creonnect-python-worker --format \"table {{.Names}}\t{{.Image}}\t{{.Status}}\"'"
