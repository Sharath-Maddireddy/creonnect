name: CI/CD Docker to AWS EC2 (Python)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PYTHON_VERSION: "3.11"
  ECR_REPOSITORY: "creonnect-python"

jobs:
  ci:
    name: Test Checks
    runs-on: ubuntu-latest
    env:
      PYTHONWARNINGS: ignore::DeprecationWarning
      ENV: test
      DATABASE_URL: sqlite+aiosqlite:///./test.db
      REDIS_URL: redis://localhost:6379/0
      OPENAI_API_KEY: sk-test-placeholder
      GEMINI_API_KEY: test-placeholder
      BRAND_API_KEY: test-placeholder
      CREONNECT_SESSION_SECRET: test-placeholder-secret-for-ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          if [ -f backend/requirements.txt ]; then
            pip install -r backend/requirements.txt
          fi

      - name: Run antigravity suites
        run: |
          python -m pytest backend/app/tests/test_api_antigravity_runner.py -v --tb=short
          python -m pytest backend/app/tests/test_system_antigravity_suite.py -v --tb=short

  build-and-push:
    name: Build and Push Docker Image to ECR
    runs-on: ubuntu-latest
    needs: ci
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
      image_uri: ${{ steps.vars.outputs.image_uri }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image variables
        id: vars
        run: |
          IMAGE_TAG="sha-${GITHUB_SHA}"
          ECR_REGISTRY="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com"
          IMAGE_URI="${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}:${IMAGE_TAG}"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.vars.outputs.image_uri }}
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:latest

  deploy:
    name: Deploy Docker on AWS EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload compose file to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          source: "docker-compose.prod.yml"
          target: "${{ secrets.EC2_APP_DIR }}"

      - name: Deploy and restart containers
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_ENV: ${{ secrets.EC2_APP_ENV }}
          APP_DIR: ${{ secrets.EC2_APP_DIR }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          IMAGE_URI: ${{ needs.build-and-push.outputs.image_uri }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          envs: APP_ENV,APP_DIR,AWS_REGION,AWS_ACCOUNT_ID,ECR_REPOSITORY,IMAGE_TAG,IMAGE_URI
          script_stop: true
          script: |
            set -euo pipefail
            mkdir -p "${APP_DIR}"
            printf '%s' "${APP_ENV}" > "${APP_DIR}/.env"
            chmod 600 "${APP_DIR}/.env"
            cp "${APP_DIR}/docker-compose.prod.yml" "${APP_DIR}/docker-compose.yml"
            ECR_REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
            aws ecr get-login-password --region "${AWS_REGION}" | docker login --username AWS --password-stdin "${ECR_REGISTRY}"
            export ECR_IMAGE="${IMAGE_URI}"
            docker compose -f "${APP_DIR}/docker-compose.yml" --env-file "${APP_DIR}/.env" pull
            docker compose -f "${APP_DIR}/docker-compose.yml" --env-file "${APP_DIR}/.env" up -d
            sleep 8
            curl -fsS "http://127.0.0.1:8000/health" >/dev/null
            docker ps --filter name=creonnect-python-api --filter name=creonnect-python-worker --format "table {{.Names}}\t{{.Image}}\t{{.Status}}"
