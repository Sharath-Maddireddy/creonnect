services:
  redis:
    image: redis:7-alpine
    container_name: creonnect-redis
    restart: unless-stopped
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--requirepass",
        "${REDIS_PASSWORD:?REDIS_PASSWORD must be set}"
      ]
    volumes:
      - redis-data:/data

  api:
    image: ${ECR_IMAGE}
    container_name: creonnect-python-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    ports:
      - "8000:8000"
      - "50051:50051"
    depends_on:
      - redis
    command:
      [
        "python",
        "-m",
        "uvicorn",
        "backend.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--workers",
        "1",
        "--log-level",
        "info"
      ]

  worker:
    image: ${ECR_IMAGE}
    container_name: creonnect-python-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      - redis
    command: ["python", "-m", "backend.app.workers.sqs_worker"]

volumes:
  redis-data:
